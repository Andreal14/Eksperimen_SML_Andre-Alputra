name: "Automated Preprocessing — Wine Quality"

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan menjalankan workflow secara manual'
        required: false
        default: 'Manual trigger'

jobs:
  preprocess:
    name: "Run Preprocessing Pipeline"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Python 3.12 ──
      - name: "Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install dependencies ──
      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      # ── 4. Verifikasi dataset tersedia ──
      - name: "Verify raw dataset exists"
        run: |
          if [ ! -f "winequality-red.csv" ]; then
            echo "Dataset tidak ditemukan, mendownload dari UCI..."
            curl -L "https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-red.csv" \
              -o "winequality-red.csv"
          else
            echo "Dataset ditemukan: $(wc -l < winequality-red.csv) baris"
          fi

      # ── 5. Jalankan script preprocessing ──
      - name: "Run preprocessing pipeline"
        run: |
          cd preprocessing
          python automate_Andre-Alputra.py

      # ── 6. Tampilkan hasil preprocessing ──
      - name: "Display preprocessing results"
        run: |
          echo "=== Hasil Preprocessing ==="
          ls -lh preprocessing/winequality_preprocessing/
          echo ""
          echo "=== Preview X_train.csv (5 baris) ==="
          head -6 preprocessing/winequality_preprocessing/X_train.csv
          echo ""
          echo "=== Preview y_train.csv (5 baris) ==="
          head -6 preprocessing/winequality_preprocessing/y_train.csv

      # ── 7. Commit & push hasil preprocessing ke repository ──
      - name: "Commit and push preprocessed dataset"
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/winequality_preprocessing/
          git status
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
          else
            git commit -m "chore: update preprocessed wine quality dataset [skip ci]

            Triggered by: ${{ github.event_name }}
            Commit SHA  : ${{ github.sha }}
            Timestamp   : $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "Preprocessed data berhasil di-push!"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
